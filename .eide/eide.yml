version: "4.1"
name: JointMotor_Project
type: ARM
deviceName: AT32F403ACGT7
packDir: .pack/Keil/AT32F4xx_DFP.1.3.7
srcDirs:
  - AT32WorkBench
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: d8a33265d40118656a5a2230eb5e8945
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - AT32F403ACGT7
      incList:
        - .
        - AT32WorkBench/libraries/cmsis/cm4/core_support
        - AT32WorkBench/libraries/cmsis/cm4/device_support
        - AT32WorkBench/libraries/drivers/inc
        - AT32WorkBench/middlewares/freertos/source/include
        - AT32WorkBench/middlewares/freertos/source/portable/GCC/ARM_CM4F
        - AT32WorkBench/middlewares/usbd_drivers/inc
        - AT32WorkBench/project/inc
      libList: []
    excludeList:
      - AT32WorkBench/middlewares/freertos/source/portable/IAR
      - AT32WorkBench/middlewares/freertos/source/portable/GCC/ARM_CM3
      - AT32WorkBench/middlewares/freertos/source/portable/rvds
      - AT32WorkBench/middlewares/freertos/source/portable/memmang/heap_1.c
      - AT32WorkBench/middlewares/freertos/source/portable/memmang/heap_2.c
      - AT32WorkBench/middlewares/freertos/source/portable/memmang/heap_3.c
      - AT32WorkBench/middlewares/freertos/source/portable/memmang/heap_5.c
      - AT32WorkBench/middlewares/freertos/source/portable/common/mpu_wrappers.c
      - AT32WorkBench/middlewares/usbd_class/audio
      - AT32WorkBench/middlewares/usbd_class/audio_hid
      - AT32WorkBench/middlewares/usbd_class/composite_cdc_msc
      - AT32WorkBench/middlewares/usbd_class/composite_cdc_keyboard
      - AT32WorkBench/middlewares/usbd_class/custom_hid
      - AT32WorkBench/middlewares/usbd_class/cdc
      - AT32WorkBench/middlewares/usbd_class/msc
      - AT32WorkBench/middlewares/usbd_class/winusb
      - AT32WorkBench/libraries/cmsis/cm4/device_support/startup/iar
      - AT32WorkBench/libraries/cmsis/cm4/device_support/startup/mdk
      - AT32WorkBench/libraries/cmsis/cm4/device_support/startup/gcc
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: AT32WorkBench/AT32F403AxG_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: atlink
        target: at32f403a_407_spim_type1_remap0
    uploader: OpenOCD
